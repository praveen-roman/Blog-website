{% load static %}

<div class="container">
    <header class="blog-header py-3">
        <div class="row align-items-center">

            <!-- Logo -->
            <div class="col-lg-3 text-center text-lg-left mb-3 mb-lg-0">
                <a class="blog-header-logo text-dark text-decoration-none" href="/">
                    <strong>DailySpar</strong>
                </a>
            </div>

            <!-- Navigation -->
            <div class="col-lg-3 text-center mb-3 mb-lg-0">
                <a href="/" class="mx-3 nav-link-custom">
                    Home
                </a>

                <a href="{% url 'about' %}" class="mx-3 nav-link-custom">
                    About
                </a>
            </div>

            <!-- Search -->
            <div class="col-lg-3 mb-3 mb-lg-0">
                <form method="GET" action="/">
                    <div class="input-group">

                        <input type="text" name="search" value="{{ request.GET.search }}" class="form-control"
                            placeholder="Search posts...">

                        <div class="input-group-append">
                            <button class="btn btn-warning" type="submit">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>

                    </div>
                </form>
            </div>

            <!-- Buttons -->
            <div class="col-lg-3 text-center text-lg-right">
                {% if not user.is_authenticated %}

                <a class="btn btn-warning btn-sm mr-2" href="{% url 'login_page' %}">
                    Login
                </a>

                <a class="btn btn-outline-secondary btn-sm" href="{% url 'register' %}">
                    Register
                </a>
                {% else %}
                <span class="mr-3">
                    Welcome, {{ user.username }}
                </span>

                <a class="btn btn-danger btn-sm" href="{% url 'logout_page' %}">
                    Logout
                </a>
                {% endif %}

            </div>

        </div>
    </header>

</div>
