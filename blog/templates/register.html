{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg">
                <div class="card-body">

                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>

                    <form method="POST">
                        {% csrf_token %}

                        {{ form|crispy }}

                        <button
                            type="submit"
                            class="btn btn-primary btn-block">
                            Register
                        </button>
                    </form>

                </div>
            </div>

        </div>

    </div>
</div>

{% endblock %}
