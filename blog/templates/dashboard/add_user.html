{% extends 'base.html' %}
{% load static %}
{% block content %}
{% load crispy_forms_tags %}


<div class="row">

    {% include 'dashboard/list.html' %}
    <div class="col-md-9">
        {% if perms.auth.add_user %}
        <h3> <strong>Add New User</strong></h3>

        <form action="{% url  'add_user' %}" method="POST" style="width: 500px;">
            {% csrf_token %}
            {{form |crispy }}
            <button type="submit" class="btn btn-warning" >Submit</button>

        </form>
        <br>
        {% else %}
        <h5>You dont Have Permission To Use This Page</h5>
        {% endif %}

    </div>
</div>


{% endblock %}
